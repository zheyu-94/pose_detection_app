name: pose_detection_app
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8 # 統一使用較新版本

  # AI 與相機核心 (已對齊版本)
  google_mlkit_pose_detection: ^0.13.0
  google_mlkit_commons: ^0.9.0
  camera: ^0.11.0+2
  flutter_tts: ^3.8.3

  # 資料庫儲存
  sqflite: ^2.3.0
  path: ^1.9.0
  firebase_core: ^4.5.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.1.3

  shared_preferences: ^2.2.2
  intl: ^0.20.2
  fl_chart: ^0.68.0
  table_calendar: ^3.2.0
  image_picker: ^1.2.1
  firebase_storage: ^13.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
